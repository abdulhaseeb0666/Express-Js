<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-4">


  <div class="max-w-6xl mx-auto">
    <h2 class="text-2xl font-semibold mb-6">Student Records</h2>

    <!-- Top Controls -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search by name"
        class="w-full md:w-1/2 px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
      >

      <div class="flex gap-2 flex-wrap">
        <button onclick="openModal('addStudentModal')" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
          Add Student
        </button>
        <button onclick="fetchStudents()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
          Refresh
        </button>
        <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700">
          Logout
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto bg-white rounded-xl shadow">
      <table class="min-w-full border border-gray-200">
        <thead class="bg-gray-800 text-white">
          <tr>
            <th class="p-3">Profile</th>
            <th class="p-3">First Name</th>
            <th class="p-3">Last Name</th>
            <th class="p-3">Email</th>
            <th class="p-3">Phone</th>
            <th class="p-3">Gender</th>
            <th class="p-3">Actions</th>
          </tr>
        </thead>
        <tbody id="studentTableBody" class="text-center"></tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="flex justify-center mt-6 gap-2" id="pagination"></div>
  </div>

  <!-- ================= MODALS ================= -->

  <!-- View Modal -->
  <div id="viewStudentModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 w-full max-w-md">
      <div class="flex justify-between items-center mb-4">
        <h5 class="text-lg font-semibold">Student Details</h5>
        <button onclick="closeModal('viewStudentModal')">✕</button>
      </div>

      <div>
        <img id="viewProfilePic" class="rounded mb-3 w-24 h-24 object-cover" />
        <p><strong>Name:</strong> <span id="viewName"></span></p>
        <p><strong>Email:</strong> <span id="viewEmail"></span></p>
        <p><strong>Phone:</strong> <span id="viewPhone"></span></p>
        <p><strong>Gender:</strong> <span id="viewGender"></span></p>
      </div>
    </div>
  </div>

  <!-- Add Modal -->
  <div id="addStudentModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 w-full max-w-md">
      
      <div class="flex justify-between items-center mb-4">
        <h5 class="text-lg font-semibold">Add New Student</h5>
        <button onclick="closeModal('addStudentModal')">✕</button>
      </div>

      <form id="addStudentForm" enctype="multipart/form-data" class="space-y-3">

        <input type="text" name="first_name" placeholder="First Name" required class="w-full px-3 py-2 border rounded-lg">

        <input type="text" name="last_name" placeholder="Last Name" required class="w-full px-3 py-2 border rounded-lg">

        <input type="email" name="email" placeholder="Email" required class="w-full px-3 py-2 border rounded-lg">

        <input type="text" name="phone" placeholder="Phone" required class="w-full px-3 py-2 border rounded-lg">

        <select name="gender" required class="w-full px-3 py-2 border rounded-lg">
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>

        <div>
          <label class="text-sm">Upload Profile Picture:</label>
          <input type="file" name="profile_pic" required class="w-full mt-1">
        </div>

        <button class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700">
          Create Student
        </button>
      </form>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editStudentModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
    <div class="bg-white rounded-xl p-6 w-full max-w-md">

      <div class="flex justify-between items-center mb-4">
        <h5 class="text-lg font-semibold">Edit Student</h5>
        <button onclick="closeModal('editStudentModal')">✕</button>
      </div>

      <form id="editStudentForm" enctype="multipart/form-data" class="space-y-3">

        <input type="hidden" id="editStudentId">

        <input type="text" id="editFirstName" name="first_name" placeholder="First Name" required class="w-full px-3 py-2 border rounded-lg">

        <input type="text" id="editLastName" name="last_name" placeholder="Last Name" required class="w-full px-3 py-2 border rounded-lg">

        <input type="email" id="editEmail" name="email" placeholder="Email" required class="w-full px-3 py-2 border rounded-lg">

        <input type="text" id="editPhone" name="phone" placeholder="Phone" required class="w-full px-3 py-2 border rounded-lg">

        <select id="editGender" name="gender" required class="w-full px-3 py-2 border rounded-lg">
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>

        <div>
          <label class="text-sm">Upload New Profile Picture:</label>
          <input type="file" id="editProfilePic" name="profile_pic" class="w-full mt-1">
        </div>

        <button class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
          Update
        </button>
      </form>
    </div>
  </div>

  
  <script>

  // ================= MODALS =================
  function openModal(id) {
    document.getElementById(id).classList.remove("hidden");
  }

  function closeModal(id) {
    document.getElementById(id).classList.add("hidden");
  }

  const apiUrl = 'http://localhost:3000/api/students'
  let currentPage = 1
  let currentSearch = ''

  
  // ================= Token Authentication =================
  function checkAuth(){
    const token = localStorage.getItem("token")
    if(!token){
      window.location.href = "index.html"
    }
    return token
  }

  const token = checkAuth()

  // ================= FETCH STUDENTS =================
  async function fetchStudents(search = '', page = 1){
    currentPage = page
    currentSearch = search

    const res = await fetch(
      `${apiUrl}?search=${encodeURIComponent(search)}&page=${page}&limit=5`,
      {
        headers : { 'Authorization': `Bearer ${token}` }
      }
    )

    const data = await res.json()

    const tbody = document.querySelector('#studentTableBody')
    tbody.innerHTML = ''

    if(data.students.length === 0){
      tbody.innerHTML = `
        <tr>
          <td colspan="7" class="p-4 text-gray-500">No students found</td>
        </tr>
      `
      return
    }

    data.students.forEach(student => {
      tbody.innerHTML += `
        <tr class="border-t">
          <td class="p-2">
            <img src="http://localhost:3000/uploads/${student.profile_pic}" 
                 class="w-12 h-12 rounded-full object-cover"/>
          </td>
          <td>${student.first_name}</td>
          <td>${student.last_name}</td>
          <td>${student.email}</td>
          <td>${student.phone}</td>
          <td>${student.gender}</td>
          <td class="space-x-1">
            <button class="bg-blue-500 text-white px-2 py-1 rounded text-xs hover:bg-blue-600"
              onclick="viewStudent('${student._id}')">View</button>

            <button class="bg-yellow-500 text-white px-2 py-1 rounded text-xs hover:bg-yellow-600"
              onclick="editStudent('${student._id}')">Edit</button>

            <button class="bg-red-500 text-white px-2 py-1 rounded text-xs hover:bg-red-600"
              onclick="deleteStudent('${student._id}')">Delete</button>
          </td>
        </tr>
      `
    })

    renderPagination(data.totalPage)
  }

  fetchStudents()

  // ================= PAGINATION =================
  function renderPagination(totalPages) {
    const container = document.querySelector("#pagination")
    container.innerHTML = ""

    const base = "px-3 py-1 rounded-lg border text-sm"
    const active = "bg-blue-600 text-white"
    const normal = "bg-white text-gray-700 hover:bg-gray-100"
    const disabled = "bg-gray-200 text-gray-400 cursor-not-allowed"

    // Prev
    const prev = document.createElement("button")
    prev.textContent = "Prev"
    prev.className = `${base} ${currentPage === 1 ? disabled : normal}`
    if(currentPage !== 1){
      prev.onclick = () => fetchStudents(currentSearch, currentPage - 1)
    }
    container.appendChild(prev)

    // Numbers
    for(let i = 1; i <= totalPages; i++){
      const btn = document.createElement("button")
      btn.textContent = i
      btn.className = `${base} ${i === currentPage ? active : normal}`
      if(i !== currentPage){
        btn.onclick = () => fetchStudents(currentSearch, i)
      }
      container.appendChild(btn)
    }

    // Next
    const next = document.createElement("button")
    next.textContent = "Next"
    next.className = `${base} ${currentPage === totalPages ? disabled : normal}`
    if(currentPage !== totalPages){
      next.onclick = () => fetchStudents(currentSearch, currentPage + 1)
    }
    container.appendChild(next)
  }

  // ================= VIEW =================
  async function viewStudent(id) {
    const res = await fetch(`${apiUrl}/${id}`, {
      headers : { 'Authorization': `Bearer ${token}` }
    })

    const student = await res.json()

    document.querySelector("#viewProfilePic").src =
      `http://localhost:3000/uploads/${student.profile_pic}`

    document.querySelector("#viewName").textContent =
      `${student.first_name} ${student.last_name}`

    document.querySelector("#viewEmail").textContent = student.email
    document.querySelector("#viewPhone").textContent = student.phone
    document.querySelector("#viewGender").textContent = student.gender

    openModal("viewStudentModal")
  }

  // ================= SEARCH =================
  document.querySelector("#searchInput").addEventListener("input", (e) => {
    currentPage = 1
    fetchStudents(e.target.value, 1)
  })

  // ================= ADD =================
  document.querySelector("#addStudentForm").addEventListener("submit", async function(e){
    e.preventDefault()

    const formData = new FormData(this)

    const res = await fetch(apiUrl, {
      method: 'POST',
      body: formData,
      headers : { 'Authorization': `Bearer ${token}` }
    })

    if(res.ok){
      this.reset()
      closeModal("addStudentModal")
      fetchStudents()
    } else {
      alert("Error creating student")
    }
  })

  // ================= DELETE =================
  async function deleteStudent(id){
    if(confirm("Delete this student?")){
      await fetch(`${apiUrl}/${id}`, {
        method: 'DELETE',
        headers : { 'Authorization': `Bearer ${token}` }
      })
      fetchStudents()
    }
  }

  // ================= EDIT =================
  async function editStudent(id){
    const res = await fetch(`${apiUrl}/${id}`, {
      headers : { 'Authorization': `Bearer ${token}` }
    })

    const student = await res.json()

    document.querySelector('#editStudentId').value = student._id
    document.querySelector('#editFirstName').value = student.first_name
    document.querySelector('#editLastName').value = student.last_name
    document.querySelector('#editEmail').value = student.email
    document.querySelector('#editPhone').value = student.phone
    document.querySelector('#editGender').value = student.gender

    openModal("editStudentModal")
  }

  // ================= UPDATE =================
  document.querySelector("#editStudentForm").addEventListener("submit", async function(e){
    e.preventDefault()

    const id = document.querySelector("#editStudentId").value
    const formData = new FormData(this)

    const res = await fetch(`${apiUrl}/${id}`, {
      method: 'PUT',
      body: formData,
      headers : { 'Authorization': `Bearer ${token}` }
    })

    if(res.ok){
      closeModal("editStudentModal")
      fetchStudents()
    } else {
      alert("Error updating student")
    }
  })

  // ================= LOGOUT =================
  function logout(){
    localStorage.removeItem("token")
    window.location.href = "index.html"
  }

</script>
</body>
</html>
