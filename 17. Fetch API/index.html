<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Card</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      width: 300px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      padding: 20px;
      text-align: center;
    }

    .card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }

    .info p {
      margin: 6px 0;
      color: #444;
    }

    .actions {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    .edit-btn {
      background: #3b82f6;
    }

    .delete-btn {
      background: #ef4444;
    }

    input {
      width: 90%;
      padding: 5px;
      margin: 4px 0;
    }
  </style>
</head>
<body>

  <div class="card" id="userCard">
    <img id="userImage" src="https://via.placeholder.com/100" alt="User Image" />

    <div class="info" id="userInfo">
      <p><strong>Name:</strong> <span id="name">John Doe</span></p>
      <p><strong>Email:</strong> <span id="email">john@example.com</span></p>
      <p><strong>Gender:</strong> <span id="gender">Male</span></p>
      <p><strong>Age:</strong> <span id="age">25</span></p>
    </div>

    <div class="actions">
      <button class="edit-btn" onclick="editUser()">Edit</button>
      <button class="delete-btn" onclick="deleteUser()">Delete</button>
    </div>
  </div>

  <script>
    let isEditing = false;

    function editUser() {
      const infoDiv = document.getElementById("userInfo");

      if (!isEditing) {
        // Convert text to inputs
        infoDiv.innerHTML = `
          <input id="editName" value="${document.getElementById("name").innerText}" />
          <input id="editEmail" value="${document.getElementById("email").innerText}" />
          <input id="editGender" value="${document.getElementById("gender").innerText}" />
          <input id="editAge" value="${document.getElementById("age").innerText}" />
        `;
        isEditing = true;
      } else {
        // Save changes
        const name = document.getElementById("editName").value;
        const email = document.getElementById("editEmail").value;
        const gender = document.getElementById("editGender").value;
        const age = document.getElementById("editAge").value;

        infoDiv.innerHTML = `
          <p><strong>Name:</strong> <span id="name">${name}</span></p>
          <p><strong>Email:</strong> <span id="email">${email}</span></p>
          <p><strong>Gender:</strong> <span id="gender">${gender}</span></p>
          <p><strong>Age:</strong> <span id="age">${age}</span></p>
        `;
        isEditing = false;
      }
    }

    function deleteUser() {
      const card = document.getElementById("userCard");
      card.remove();
    }
  </script>

</body>
</html>
